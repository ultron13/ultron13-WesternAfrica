services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: farmconnect
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d farmconnect"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npx prisma generate && npm run dev"
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/farmconnect?schema=public
      REDIS_URL: redis://redis:6379
      WHATSAPP_SESSION_TTL_SECONDS: 86400
      WHATSAPP_PROVIDER: clickatell
    ports:
      - "4000:4000"
    volumes:
      - .:/app
      - api_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npx prisma generate && npm run worker"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/farmconnect?schema=public
      REDIS_URL: redis://redis:6379
    volumes:
      - .:/app
      - worker_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  api_node_modules:
  worker_node_modules:
