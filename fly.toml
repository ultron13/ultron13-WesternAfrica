# fly.toml app configuration file generated for ultron13-westernafrica on 2026-05-13T12:24:47Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ultron13-westernafrica'
primary_region = 'jnb'

[build]
  dockerfile = 'Dockerfile'

[env]
  NODE_ENV = 'production'
  PORT = '4000'
  WHATSAPP_PROVIDER = 'clickatell'
  WHATSAPP_SESSION_TTL_SECONDS = '86400'

[processes]
  app = 'sh ./scripts/migrate-and-start.sh'
  worker = 'node dist/worker.js'

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 1500
    soft_limit = 1000

  [[http_service.checks]]
    interval = '15s'
    timeout = '2s'
    grace_period = '10s'
    method = 'GET'
    path = '/api/v1/health'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
  processes = ['worker']
