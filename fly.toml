app = "farmconnect-sa-api"
primary_region = "jnb"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "4000"
  WHATSAPP_SESSION_TTL_SECONDS = "86400"
  WHATSAPP_PROVIDER = "clickatell"

[processes]
  app = "node dist/server.js"
  worker = "node dist/worker.js"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"
    method = "GET"
    path = "/api/v1/health"

[[vm]]
  processes = ["app"]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

[[vm]]
  processes = ["worker"]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

